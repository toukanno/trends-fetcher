name: Fetch trending repositories

on:
  schedule:
    # Every 3 hours, offset 15 min to dodge top-of-hour cron contention.
    - cron: "15 */3 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    concurrency:
      group: fetch-trends
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run fetcher
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python scripts/fetch_trends.py

      - name: Commit and push if changed
        run: |
          if [ -z "$(git status --porcelain)" ]; then
            echo "No changes to commit."
            exit 0
          fi
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add trends data README.md
          git commit -m "chore: refresh trending repositories ($(date -u +%Y-%m-%dT%H:%MZ))"
          git push
